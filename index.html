<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Jesmond Hub</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="hotel-jesmond-icon.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #1E2A44;
            --navy-mid: #253354;
            --navy-light: #2E3D60;
            --gold: #C5A021;
            --gold-light: #D9B84A;
            --gold-dim: rgba(197, 160, 33, 0.15);
            --gold-border: rgba(197, 160, 33, 0.25);
            --white: #FFFFFF;
            --off-white: #F0EDE8;
            --text-muted: rgba(240, 237, 232, 0.45);
            --alert: #E11D48;
            --success: #10B981;
            --radius: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--navy);
            color: var(--off-white);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ===== ALERT BAR ===== */
        @keyframes pulse-alert { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }
        @keyframes slide-down { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        #alert-top {
            display: none;
            background: var(--alert);
            color: white;
            padding: 11px 20px;
            text-align: center;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse-alert 1.4s ease-in-out infinite, slide-down 0.3s ease;
            position: relative;
            z-index: 100;
        }

        /* ===== HEADER ===== */
        .header {
            background-image: linear-gradient(180deg, #1a2035 0%, #0d1420 100%);
            border-bottom: 1px solid var(--gold-border);
            padding: 36px 24px 16px;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(10, 14, 26, 0.72) 0%, rgba(10, 14, 26, 0.55) 50%, rgba(10, 14, 26, 0.80) 100%);
        }
        .corner { position: absolute; width: 16px; height: 16px; z-index: 2; }
        .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); opacity: 0.7; }
        .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); opacity: 0.7; }
        .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; z-index: 2; }
        .logo-eyebrow { font-size: 9px; letter-spacing: 6px; color: var(--gold-light); text-transform: uppercase; }
        .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 38px; letter-spacing: 10px; color: #fff; text-transform: uppercase; }

        .status-bar { background: var(--navy-mid); padding: 10px 22px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
        #clock { font-size: 13px; color: var(--gold-light); letter-spacing: 2px; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 22px 18px 36px; -webkit-overflow-scrolling: touch; }
        .section-label { font-size: 14px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold-border), transparent); }

        /* ===== GRID ===== */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
        .tile { background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; transition: transform 0.18s; }
        .tile:active { transform: scale(0.96); border-color: var(--gold-border); }
        .tile-icon { font-size: 32px; margin-bottom: 8px; }
        .tile-label { font-size: 9px; color: var(--off-white); text-align: center; letter-spacing: 0.5px; text-transform: uppercase; opacity: 0.8; }

        /* ===== LABOR TRACKER ===== */
        .labor-card { background: var(--navy-mid); border: 1px solid var(--gold-border); border-radius: var(--radius); padding: 20px; margin-bottom: 28px; }
        .labor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 9px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
        .labor-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; padding: 10px; font-family: 'DM Mono'; font-size: 14px; outline: none; }
        .labor-input:focus { border-color: var(--gold); }
        .result-display { text-align: center; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px dashed var(--gold-border); margin-bottom: 15px; }
        .result-val { font-size: 32px; font-weight: 500; color: var(--gold); display: block; }
        .save-btn { width: 100%; background: var(--gold); border: none; border-radius: 12px; color: var(--navy); padding: 14px; font-family: 'DM Mono'; font-weight: 600; font-size: 10px; letter-spacing: 1px; cursor: pointer; }

        /* ===== CHECKLIST & HANDOVER ===== */
        .checklist { background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); overflow: hidden; margin-bottom: 22px; }
        .task-row { display: flex; align-items: center; padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 14px; }
        .time-chip { font-size: 9px; color: var(--navy); background: var(--gold); padding: 5px 10px; border-radius: 8px; min-width: 60px; text-align: center; }
        .task-name { font-size: 13px; flex: 1; }
        .handover-card { background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); overflow: hidden; margin-bottom: 22px; }
        .handover-input-row { display: flex; gap: 10px; padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #note-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: white; padding: 11px; font-family: 'DM Mono'; font-size: 12px; outline: none; resize: none; }
        
        /* Animations */
        @keyframes fade-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        .grid, .checklist, .labor-section, .handover-section { animation: fade-up 0.5s ease both; }
    </style>
</head>
<body>

<div id="alert-top">🚨 &nbsp; Vibe Check — Adjust lights & audio now</div>

<div class="header">
    <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
    <div class="logo-wrap">
        <div class="logo-eyebrow">Hotel</div>
        <div class="logo-name">Jesmond</div>
        <div class="logo-sub">Newcastle, Australia</div>
    </div>
</div>

<div class="status-bar">
    <div id="clock">00:00 AM</div>
    <div id="weather-wrap"><span id="weather-icon">☀</span> <span id="weather-temp">--°</span></div>
</div>

<div class="scroll-area">
    <div class="section-label">Operations</div>
    <div class="grid">
        <div onclick="window.location.href='https://hoteljesmond.au.deputy.com/#/home'" class="tile">
            <div class="tile-icon">📅</div><div class="tile-label">Deputy</div>
        </div>
        <div onclick="window.location.href='https://app.wirely.com.au/staff/reporting-snapshot'" class="tile">
            <div class="tile-icon">📊</div><div class="tile-label">Wirely</div>
        </div>
        <div onclick="document.getElementById('labor-section').scrollIntoView({behavior:'smooth'})" class="tile">
            <div class="tile-icon">💰</div><div class="tile-label">Labor</div>
        </div>
        <div onclick="window.location.href='https://restaurant.nowbookit.com/'" class="tile">
            <div class="tile-icon">🍽️</div><div class="tile-label">Bistro</div>
        </div>
        <div onclick="window.location.href='https://login.newbook.cloud'" class="tile">
            <div class="tile-icon">🏨</div><div class="tile-label">Rooms</div>
        </div>
        <div onclick="window.location.href='https://www.managemynightlife.com/#/zones'" class="tile">
            <div class="tile-icon">🎵</div><div class="tile-label">Music</div>
        </div>
    </div>

    <div class="section-label" id="labor-section">Labor Cost Tracker</div>
    <div class="labor-card">
        <div class="labor-grid">
            <div class="input-group" style="grid-column: span 2;">
                <label>Gross Wages ($)</label>
                <input type="number" id="inp-wages" class="labor-input" placeholder="0.00" style="border-color: var(--gold-border);">
            </div>
            <div class="input-group"><label>Gaming ($)</label><input type="number" id="inp-gaming" class="labor-input" placeholder="0.00"></div>
            <div class="input-group"><label>Beverage ($)</label><input type="number" id="inp-bar" class="labor-input" placeholder="0.00"></div>
            <div class="input-group"><label>Food ($)</label><input type="number" id="inp-food" class="labor-input" placeholder="0.00"></div>
            <div class="input-group"><label>Accomm ($)</label><input type="number" id="inp-acc" class="labor-input" placeholder="0.00"></div>
        </div>
        <div class="result-display">
            <span style="font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted);">Current Wage %</span>
            <span id="wage-result" class="result-val">0.00%</span>
        </div>
        <button id="btn-save-labor" class="save-btn">SAVE WEEKLY DATA</button>
    </div>

    <div class="section-label">Managers Checklist</div>
    <div class="checklist">
        <div class="task-row"><div class="time-chip">10:00 AM</div><div class="task-name">Safe Count</div></div>
        <div class="task-row"><div class="time-chip">05:00 PM</div><div class="task-name">Vibe Check</div></div>
        <div class="task-row"><div class="time-chip">01:00 AM</div><div class="task-name">Final Safe Count</div></div>
    </div>

    <div class="handover-section">
        <div class="section-label">Handover Log</div>
        <div class="handover-card">
            <div class="handover-input-row">
                <input type="text" id="staff-input" placeholder="Name" style="width: 80px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; padding: 5px 10px; font-family: 'DM Mono'; font-size: 11px;">
                <textarea id="note-input" placeholder="Add note..." rows="1"></textarea>
                <button id="note-submit" style="background:var(--gold); border:none; border-radius:10px; width:40px; color:var(--navy); font-weight:bold;">+</button>
            </div>
            <div id="log-entries" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getFirestore, doc, setDoc, addDoc, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC1-n25spgY3epta_ANquA9Gm0Ppo7ttsY",
        authDomain: "hotel-jesmond-hub.firebaseapp.com",
        projectId: "hotel-jesmond-hub",
        storageBucket: "hotel-jesmond-hub.firebasestorage.app",
        messagingSenderId: "61051163173",
        appId: "1:61051163173:web:56a0c8f634a67881b5a5cc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ===== CLOCK =====
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
    }, 1000);

    // ===== LABOR CALCULATION =====
    const calcInputs = ['inp-wages', 'inp-gaming', 'inp-bar', 'inp-food', 'inp-acc'];
    function updateLabor() {
        const wages = parseFloat(document.getElementById('inp-wages').value) || 0;
        const rev = calcInputs.slice(1).reduce((sum, id) => sum + (parseFloat(document.getElementById(id).value) || 0), 0);
        const resEl = document.getElementById('wage-result');
        if (rev > 0) {
            const pct = (wages / rev) * 100;
            resEl.innerText = pct.toFixed(2) + '%';
            resEl.style.color = pct < 20 ? '#10B981' : (pct < 30 ? 'var(--gold)' : 'var(--alert)');
        } else { resEl.innerText = '0.00%'; }
    }
    calcInputs.forEach(id => document.getElementById(id).addEventListener('input', updateLabor));

    // ===== SAVE TO FIREBASE =====
    document.getElementById('btn-save-labor').addEventListener('click', async () => {
        const wages = parseFloat(document.getElementById('inp-wages').value) || 0;
        const rev = calcInputs.slice(1).reduce((sum, id) => sum + (parseFloat(document.getElementById(id).value) || 0), 0);
        if (wages === 0 || rev === 0) return alert("Enter figures first");
        
        try {
            await addDoc(collection(db, 'labor_stats'), {
                ts: Date.now(),
                wages: wages,
                total_rev: rev,
                pct: (wages/rev)*100
            });
            alert("Week data saved!");
        } catch(e) { console.error(e); }
    });
</script>

</body>
</html>

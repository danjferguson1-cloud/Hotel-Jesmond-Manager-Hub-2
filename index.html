<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Jesmond Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0D1420; --card: #1A2438; --gold: #C5A021; --gold-dim: rgba(197, 160, 33, 0.2); }
        body { font-family: 'DM Mono', monospace; background: var(--navy); color: white; margin: 0; padding: 20px; padding-bottom: 100px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--gold-dim); margin-bottom: 20px; }
        .logo { font-family: 'Cormorant Garamond'; font-size: 32px; letter-spacing: 8px; text-transform: uppercase; }
        .section-label { color: var(--gold); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 30px 0 15px; display: block; border-bottom: 1px solid var(--gold-dim); padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .tile { background: var(--card); padding: 15px 5px; border-radius: 12px; text-align: center; text-decoration: none; color: white; font-size: 9px; border: 1px solid rgba(255,255,255,0.05); }
        .tile span { display: block; font-size: 20px; margin-bottom: 5px; }
        .labor-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
        .l-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { background: #000; border: 1px solid #444; border-radius: 8px; color: white; padding: 12px; font-family: 'DM Mono'; font-size: 16px; width: 100%; box-sizing: border-box; }
        .result { margin-top: 15px; padding: 15px; background: var(--gold-dim); border-radius: 12px; text-align: center; }
        #wage-result { font-size: 32px; color: var(--gold); font-weight: bold; }
        .btn { width: 100%; background: var(--gold); color: var(--navy); border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; font-family: 'DM Mono'; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Jesmond</div>
    <div style="font-size: 9px; letter-spacing: 3px; opacity: 0.5;">MANAGER HUB</div>
</div>

<div class="grid">
    <a href="https://hoteljesmond.au.deputy.com" class="tile"><span>📅</span>DEPUTY</a>
    <a href="https://app.wirely.com.au" class="tile"><span>📊</span>WIRELY</a>
    <a href="https://restaurant.nowbookit.com" class="tile"><span>🍽️</span>BISTRO</a>
</div>

<div class="section-label">Labor Cost Tracker</div>
<div class="labor-card">
    <div class="l-grid">
        <div style="grid-column: span 2;">
            <label style="font-size: 9px; opacity: 0.5;">GROSS WAGES ($)</label>
            <input type="number" id="w" placeholder="36492.34" style="border-color: var(--gold);">
        </div>
        <div><label style="font-size: 9px; opacity: 0.5;">GAMING</label><input type="number" id="g" placeholder="82600"></div>
        <div><label style="font-size: 9px; opacity: 0.5;">BEV</label><input type="number" id="b" placeholder="47703"></div>
        <div><label style="font-size: 9px; opacity: 0.5;">FOOD</label><input type="number" id="f" placeholder="40676"></div>
        <div><label style="font-size: 9px; opacity: 0.5;">ACC</label><input type="number" id="a" placeholder="9462"></div>
    </div>
    <div class="result">
        <div style="font-size: 10px; opacity: 0.6;">CURRENT WAGE %</div>
        <div id="wage-result">0.00%</div>
    </div>
    <button class="btn" onclick="saveData()">Save Weekly Stats</button>
</div>

<script>
    const ids = ['w', 'g', 'b', 'f', 'a'];
    ids.forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            const wages = parseFloat(document.getElementById('w').value) || 0;
            const rev = ids.slice(1).reduce((s, i) => s + (parseFloat(document.getElementById(i).value) || 0), 0);
            const res = document.getElementById('wage-result');
            if (rev > 0) {
                const pct = (wages / rev) * 100;
                res.innerText = pct.toFixed(2) + '%';
                res.style.color = pct < 21 ? '#10B981' : (pct < 28 ? '#C5A021' : '#ff4444');
            }
        });
    });
    function saveData() { alert('Data saving initialized...'); }
</script>

</body>
</html>

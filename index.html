<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Jesmond Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0D1420; --card: #1A2438; --gold: #C5A021; --gold-dim: rgba(197, 160, 33, 0.2); --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'DM Mono', monospace; background: var(--navy); color: white; margin: 0; padding: 20px; padding-bottom: 80px; -webkit-font-smoothing: antialiased; }
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid var(--gold-dim); margin-bottom: 20px; }
        .logo { font-family: 'Cormorant Garamond'; font-size: 34px; letter-spacing: 8px; text-transform: uppercase; }
        .section-label { color: var(--gold); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 30px 0 15px; display: block; border-bottom: 1px solid var(--gold-dim); padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .tile { background: var(--card); padding: 18px 5px; border-radius: 16px; text-align: center; text-decoration: none; color: white; border: 1px solid var(--border); }
        .checklist-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .checkbox { width: 24px; height: 24px; border: 2px solid var(--gold-dim); border-radius: 6px; }
        .checked .checkbox { background: var(--gold); border-color: var(--gold); position: relative; }
        .checked .checkbox::after { content: '✓'; color: var(--navy); font-weight: bold; position: absolute; left: 5px; top: 1px; }
        input, textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; padding: 12px; font-family: 'DM Mono'; margin-bottom: 10px; box-sizing: border-box; }
        .btn-gold { width: 100%; background: var(--gold); color: var(--navy); border: none; padding: 14px; border-radius: 12px; font-weight: bold; font-family: 'DM Mono'; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Jesmond</div>
    <div style="font-size: 9px; opacity: 0.5;">MANAGER HUB</div>
</div>

<div class="grid">
    <a href="https://hoteljesmond.au.deputy.com" class="tile"><span>📅</span><div style="font-size:9px;">ROSTERS</div></a>
    <a href="https://app.wirely.com.au" class="tile"><span>📊</span><div style="font-size:9px;">WIRELY</div></a>
    <a href="https://restaurant.nowbookit.com" class="tile"><span>🍽️</span><div style="font-size:9px;">BISTRO</div></a>
</div>

<div class="section-label">Checklist</div>
<input type="text" id="checker-name" placeholder="Enter Your Name First">

<div id="checklist">
    <div class="checklist-item" id="task-safe" onclick="syncToggle('task-safe', 'Safe Count')">
        <div><span style="color:var(--gold); font-size:10px;">10:00 AM</span><br>Safe Count<div class="stamp" style="font-size:9px; color:var(--gold); display:none;"></div></div>
        <div class="checkbox"></div>
    </div>
    <div class="checklist-item" id="task-cellar" onclick="syncToggle('task-cellar', 'Cellar Check')">
        <div><span style="color:var(--gold); font-size:10px;">11:00 AM</span><br>Cellar Check<div class="stamp" style="font-size:9px; color:var(--gold); display:none;"></div></div>
        <div class="checkbox"></div>
    </div>
    <div class="checklist-item" id="task-vibe" onclick="syncToggle('task-vibe', 'Vibe Check')">
        <div><span style="color:var(--gold); font-size:10px;">05:00 PM</span><br>Vibe Check (Lights/Music/Footy)<div class="stamp" style="font-size:9px; color:var(--gold); display:none;"></div></div>
        <div class="checkbox"></div>
    </div>
</div>

<div class="section-label">Handover Notes</div>
<input type="text" id="log-name" placeholder="Manager Name">
<textarea id="log-text" placeholder="Shift notes..."></textarea>
<button class="btn-gold" onclick="addHandoverNote()">Post Note</button>
<div id="feed" style="margin-top:20px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, query, onSnapshot, serverTimestamp, addDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC1-n25spgY3epta_ANquA9Gm0Ppo7ttsY",
        authDomain: "hotel-jesmond-hub.firebaseapp.com",
        projectId: "hotel-jesmond-hub",
        appId: "1:61051163173:web:56a0c8f634a67881b5a5cc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.syncToggle = async function(id) {
        const name = document.getElementById('checker-name').value;
        const el = document.getElementById(id);
        if (!el.classList.contains('checked')) {
            if (!name) return alert("Enter your name first!");
            await setDoc(doc(db, "active_checklist", id), { name: name, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        } else { await deleteDoc(doc(db, "active_checklist", id)); }
    };

    onSnapshot(collection(db, "active_checklist"), (snap) => {
        document.querySelectorAll('.checklist-item').forEach(i => { i.classList.remove('checked'); i.querySelector('.stamp').style.display='none'; });
        snap.forEach(d => {
            const el = document.getElementById(d.id);
            if (el) {
                el.classList.add('checked');
                const s = el.querySelector('.stamp');
                s.innerText = `Done by ${d.data().name} @ ${d.data().time}`;
                s.style.display = 'block';
            }
        });
    });

    window.addHandoverNote = async function() {
        const n = document.getElementById('log-name');
        const t = document.getElementById('log-text');
        if (n.value && t.value) {
            await addDoc(collection(db, "handover_notes"), { name: n.value, note: t.value, timestamp: serverTimestamp() });
            t.value = "";
        }
    };

    onSnapshot(query(collection(db, "handover_notes"), orderBy("timestamp", "desc"), limit(5)), (snap) => {
        const f = document.getElementById('feed'); f.innerHTML = "";
        snap.forEach(d => {
            const div = document.createElement('div');
            div.style.cssText = "background:var(--card); padding:10px; border-radius:8px; margin-bottom:10px; border-left:3px solid var(--gold);";
            div.innerHTML = `<div style="font-size:10px; color:var(--gold);">${d.data().name}</div><div>${d.data().note}</div>`;
            f.appendChild(div);
        });
    });
</script>
</body>
</html>

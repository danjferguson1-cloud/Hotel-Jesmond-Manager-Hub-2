<div class="labor-section" id="labor-section" style="margin-top: 20px;">
    <div class="section-label">Weekly Labor Performance</div>
    <div class="labor-card" id="labor-card" style="display: block; border: 1px solid var(--gold-border);">
        <div class="labor-grid">
            <div class="input-group" style="grid-column: span 2;">
                <label>Total Gross Wages ($)</label>
                <input type="number" id="inp-wages" class="labor-input" placeholder="0.00" style="font-size: 18px; border-color: var(--gold-border);">
            </div>
            <div class="input-group">
                <label>Gaming Rev ($)</label>
                <input type="number" id="inp-gaming" class="labor-input" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Beverage Rev ($)</label>
                <input type="number" id="inp-bar" class="labor-input" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Food Rev ($)</label>
                <input type="number" id="inp-food" class="labor-input" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Accomm Rev ($)</label>
                <input type="number" id="inp-acc" class="labor-input" placeholder="0.00">
            </div>
        </div>
        
        <div class="result-display" style="margin-bottom: 15px;">
            <span class="result-label">Combined Wage Cost</span>
            <span class="result-val" id="wage-result">0.00%</span>
        </div>

        <button id="btn-save-labor" style="width:100%; background:var(--gold); border:none; border-radius:12px; color:var(--navy); padding:14px; font-family:'DM Mono',monospace; font-size:10px; font-weight:600; letter-spacing:1px; cursor:pointer;">SAVE WEEKLY DATA</button>
    </div>
</div>
